<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shattered Veil - Text RPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Startup Screen -->
    <div id="startup-screen" class="startup-screen active">
        <div class="startup-content">
            <div class="logo">🌑 SHATTERED VEIL</div>
            <h1 class="game-title">An Epic Text-Based Adventure</h1>
            <div class="name-input-section">
                <label for="player-name">Enter your name, brave adventurer:</label>
                <input type="text" id="player-name" class="name-input" placeholder="Your name here..." maxlength="20">
                <button id="start-game" class="start-btn">🎮 Begin Your Journey</button>
            </div>
        </div>
    </div>

    <!-- Main Game Interface -->
    <div id="game-container" class="game-container">
        <div class="game-layout">
            <!-- Left Panel - Story & Actions -->
            <div class="left-panel">
                <div id="story-area" class="story-area">
                    <div id="story-text" class="story-text"></div>
                </div>
                <div id="actions-area" class="actions-area">
                    <div id="action-buttons" class="action-buttons"></div>
                </div>
            </div>

            <!-- Right Panel - Stats & Info -->
            <div class="right-panel">
                <!-- Current Location -->
                <div class="panel-section location-panel">
                    <h3>📍 Current Location</h3>
                    <div id="current-location" class="location-info">
                        <div class="location-name">Ashenreach</div>
                        <div class="location-desc">Central hub city shrouded in eternal twilight</div>
                    </div>
                </div>

                <!-- Player Stats -->
                <div class="panel-section stats-panel">
                    <h3>📊 Character Stats</h3>
                    <div id="player-name-display" class="player-name"></div>
                    <div class="stat-bars">
                        <div class="stat-bar">
                            <span>❤️ Health:</span>
                            <div class="bar-container">
                                <div id="health-bar" class="bar health-bar"></div>
                            </div>
                            <span id="health-text">100/100</span>
                        </div>
                        <div class="stat-bar">
                            <span>🔮 Magic:</span>
                            <div class="bar-container">
                                <div id="magic-bar" class="bar magic-bar"></div>
                            </div>
                            <span id="magic-text">40/40</span>
                        </div>
                    </div>
                    <div class="attributes">
                        <div class="attr">💪 STR: <span id="strength-val">6</span></div>
                        <div class="attr">🏹 DEX: <span id="dexterity-val">5</span></div>
                        <div class="attr">🧠 INT: <span id="intelligence-val">8</span></div>
                        <div class="attr">⭐ Level: <span id="level-val">1</span></div>
                        <div class="attr">💰 Gold: <span id="gold-val">30</span></div>
                    </div>
                </div>

                <!-- Inventory -->
                <div class="panel-section inventory-panel">
                    <h3>🎒 Inventory</h3>
                    <div id="equipped-weapon" class="equipped-item">
                        <strong>⚔️ Weapon:</strong> <span>Rusty Dagger (3-6 damage)</span>
                    </div>
                    <div id="inventory-items" class="inventory-grid"></div>
                </div>

                <!-- Spells -->
                <div class="panel-section spells-panel">
                    <h3>📜 Spells</h3>
                    <div id="spell-list" class="spell-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
